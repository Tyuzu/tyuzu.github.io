<!DOCTYPE html>
<html>


<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="description" content="Lightweight theme" />
  <link rel="canonical" href="http://localhost:4000/search/" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="alternate" type="application/rss+xml" title="Livekpop" href="/feed.xml" />
  <title>Search &middot; Livekpop</title>
  
</head>
<body>
    <header>
    <h1><a href='http://localhost:4000/' class="sitename">Livekpop</a></h1>
</header>


    <a href='http://localhost:4000/'> Home</a> | <a href='http://localhost:4000/profile/'> Profiles</a> | <a href='http://localhost:4000/lists/'> Lists</a> | <a href='http://localhost:4000/search/'> Search</a>
<hr>
    <main>
        <style>
	#search-container {
	    max-width: 100%;
	}

	input[type=text] {
		font-size: normal;
	    outline: none;
	    padding: 1rem;
		background: rgb(236, 237, 238);
	    width: 100%;
		-webkit-appearance: none;
		font-family: inherit;
		font-size: 100%;
		border: none;
	}
	#results-container {
		margin: .5rem 0;
	}
</style>

<!-- Html Elements for Search -->
<div id="search-container">
<input type="text" id="search-input" placeholder="Search...">
<ol id="results-container"></ol>
</div>

<!-- Script pointing to search-script.js -->
<script src="/search.js" type="text/javascript"></script>

<!-- Configuration -->
<script type="text/javascript">
SimpleJekyllSearch({
  searchInput: document.getElementById('search-input'),
  resultsContainer: document.getElementById('results-container'),
  json: '/search.json',
  searchResultTemplate: '<li><a href="{url}" title="{desc}">{title}</a></li>',
  noResultsText: 'No results found',
  limit: 10,
  fuzzy: false,
  exclude: ['Welcome']
})
</script>
    </main>
</body>


<footer>
    <hr class="stylish"/>
    <div>
      &copy; 2020 <a>Livekpop</a>
    </div><a href='http://localhost:4000/about/'>About </a> | <a href='http://localhost:4000/archive/'> Archive</a> 
  </footer>
</html>
